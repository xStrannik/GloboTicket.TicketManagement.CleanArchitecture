# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy UI app to Azure Web App - GloboTicket

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore UI project
        run: dotnet restore src/UI/GloboTicket.TicketManagement.App/GloboTicket.TicketManagement.App.csproj

      - name: Publish UI project
        run: dotnet publish src/UI/GloboTicket.TicketManagement.App/GloboTicket.TicketManagement.App.csproj -c Release

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: src/UI/GloboTicket.TicketManagement.App/bin/Release/net8.0/publish/wwwroot

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_394770E4E8C04FF69C1B478C344EE0DF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_888A54D0940E4EA6903D962F2F2CA3E3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_10326A361C0A4966B7E32FC3B0226FA2 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'GloboTicket'
          slot-name: 'Production'
          package: .
          